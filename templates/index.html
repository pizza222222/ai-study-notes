<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

<script>
mermaid.initialize({
startOnLoad:true,
theme:'default'
});
</script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

<script>
mermaid.initialize({ startOnLoad: true });
</script>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Merriweather&display=swap" rel="stylesheet"> 

<title>AI Study Notes Generator By Sobiya D Sora</title>

<link rel="stylesheet" href="/static/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>🧠 AI Study Notes Generator by Sobiya</h1>

<p>Upload your study material and let AI generate notes.</p>


<form method="POST" enctype="multipart/form-data">

<div class="drop-zone" id="drop-zone">

<p>Drag & Drop PDF Here</p>

<input type="file" name="file" id="fileInput" required>

</div>

<button type="submit">Generate Notes ⚡</button>

</form>


<div id="loader" style="display:none">

<div class="spinner"></div>

<p>AI is analyzing your notes...</p>

</div>


{% if result %}

<div class="result-box">

<h2>Generated Notes</h2>

<div class="notes">
{{ result | safe }}
</div>

<form action="/download" method="POST">
<input type="hidden" name="content" value="{{ result }}">
<button type="submit">Download PDF</button>
</form>


</div>

{% endif %}


{% if mindmap %}

<div class="result-box">

<h2>AI Mind Map</h2>

<div class="mindmap-box">

<h2>AI Mind Map</h2>

<div class="mermaid">
{{ mindmap }}
</div>


</div>

</div>

{% endif %}





<script>

let dropZone = document.getElementById("drop-zone")
let fileInput = document.getElementById("fileInput")

dropZone.addEventListener("dragover",(e)=>{
e.preventDefault()
dropZone.style.background="#1a2a3a"
})

dropZone.addEventListener("drop",(e)=>{
e.preventDefault()
fileInput.files = e.dataTransfer.files
})

async function sendMessage(){

let input = document.getElementById("userInput")
let chatBox = document.getElementById("chat-box")

let message = input.value

chatBox.innerHTML += `<div class="user">${message}</div>`

let response = await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:message})
})

let data = await response.json()

chatBox.innerHTML += `<div class="ai">${data.reply}</div>`

input.value=""

}

</script>

</body>
</html>
